name: Build Docusaurus Documentation
on:
  pull_request_target:
    types: [labeled]
  push:
    branches: ["master", "main"]

permissions:
  checks: write
  contents: write
  pull-requests: write

jobs:
  build-docusaurus:
    if: github.event_name == 'push' || github.event.label.name == 'BUILD DOCUSAURUS'
    timeout-minutes: 1440
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Restore Docusaurus caches
        uses: actions/cache@v4
        with:
          path: |
            .docusaurus
            node_modules/.cache
          key: ${{ runner.os }}-docusaurus-${{ hashFiles('package-lock.json', 'docusaurus.config.js') }}
          restore-keys: |
            ${{ runner.os }}-docusaurus-

      - name: Install dependencies
        run: npm ci

      - name: Build Docusaurus
        run: |
          rm -f build.tar
          npm run build
          tar cf build.tar -C build --transform 's~^\./~~' .

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with: 
          name: build
          path: build.tar
          retention-days: 90

      - name: Remove label
        if: always() && github.event_name == 'pull_request_target'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                name: 'BUILD DOCUSAURUS'
              });
            } catch (error) {
              core.warning(`Could not remove label: ${error.message}`);
            }
